<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electro Electric</title>

<style>
body{font-family:Arial;background:#f1f3f6;margin:0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.card{background:#fff;padding:10px;border-radius:10px;text-align:center}
.card img{width:100%;height:120px;object-fit:contain}
</style>
</head>

<body>

<h2 style="text-align:center">Categories</h2>

<div class="grid">

<div class="card" onclick="openCategory('transistor')">
<img src="https://via.placeholder.com/150">
<h4>Transistors</h4>
</div>

<div class="card" onclick="openCategory('mosfet')">
<img src="https://via.placeholder.com/150">
<h4>MOSFET</h4>
</div>

<div class="card" onclick="openCategory('capacitor')">
<img src="https://via.placeholder.com/150">
<h4>Capacitors</h4>
</div>

<div class="card" onclick="openCategory('pcb')">
<img src="https://via.placeholder.com/150">
<h4>Induction PCB</h4>
</div>

</div>

<script>
function openCategory(cat){
  window.location.href = "product.html?cat=" + cat;
}
</script>

</body>
</html>
