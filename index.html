<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Electro Electric - Pro Store</title>

<style>
body{margin:0;font-family:Arial;background:#f1f3f6}
header{background:#131921;color:#fff;padding:15px;text-align:center}
.search-box{padding:10px;width:90%;margin:10px auto;display:block;border-radius:5px;border:none}
.container{padding:10px}
.product{background:#fff;margin:10px 0;padding:10px;border-radius:8px}
.price{color:green;font-weight:bold}
button{padding:8px;border:none;border-radius:5px;margin-top:5px;cursor:pointer}
.add{background:#ff9900}
.buy{background:#28a745;color:#fff}
.cart{position:fixed;bottom:10px;right:10px;background:#000;color:#fff;padding:10px;border-radius:50%}
.rating{color:orange}
</style>
</head>

<body>

<header>
<h2>Electro Electric</h2>
<p>North East Delhi</p>
</header>

<input type="text" class="search-box" placeholder="Search product..." onkeyup="searchProduct(this.value)">

<div class="container" id="productList"></div>

<div class="cart" onclick="viewCart()">🛒</div>

<script>
let products=[
 {name:'SMPS Repair Kit',price:299,rating:4},
 {name:'Induction Repair Kit',price:399,rating:5},
 {name:'Multimeter',price:199,rating:4}
];

let cart=[];

function displayProducts(list){
 let html='';
 list.forEach(p=>{
  html+=`
  <div class="product">
   <h3>${p.name}</h3>
   <p class="price">₹${p.price}</p>
   <p class="rating">${'⭐'.repeat(p.rating)}</p>
   <button class="add" onclick="addToCart('${p.name}',${p.price})">Add to Cart</button>
   <button class="buy" onclick="buyNow('${p.name}',${p.price})">Buy Now</button>
  </div>`;
 });
 document.getElementById('productList').innerHTML=html;
}

function addToCart(name,price){
 cart.push({name,price});
 alert('Added to cart');
}

function viewCart(){
 let total=0;
 let msg='Cart:\n';
 cart.forEach(c=>{
  msg+=c.name+' ₹'+c.price+'\n';
  total+=c.price;
 });
 msg+='Total: ₹'+total;
 alert(msg);
}

function buyNow(name,price){
 let upi="9953311542@ybl";
 let url=`upi://pay?pa=${upi}&pn=ElectroElectric&am=${price}&cu=INR`;
 window.location.href=url;
}

function searchProduct(text){
 let filtered=products.filter(p=>p.name.toLowerCase().includes(text.toLowerCase()));
 displayProducts(filtered);
}

// load

displayProducts(products);
</script>

</body>
</html>
